services:
  consul:
    image: hashicorp/consul:1.20.0
    restart: unless-stopped
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -ui -node=consul-server -bootstrap-expect=1 -client=0.0.0.0
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 5s
      timeout: 2s
      retries: 3

  app:
    # image: ghcr.io/adelbeit/jamroom:${IMAGE_TAG}
    build:
      context: .
      dockerfile: dockerfile
      target: ${BUILD_TARGET:-runner}
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL}
      - CONSUL_HTTP_ADDR=consul:8500
      - PORT=8080
      - SERVICE_ADDRESS=app
    depends_on:
      redis:
        condition: service_healthy
      consul:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: ghcr.io/adelbeit/jamroom-caddy:v1.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.template:/etc/caddy/Caddyfile.template:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN
      - CONSUL_HTTP_ADDR=consul:8500
      - SERVICE_NAME=jamroom-app
      - CADDYFILE_TEMPLATE=/etc/caddy/Caddyfile.template
      - CADDYFILE_PATH=/etc/caddy/Caddyfile
    depends_on:
      consul:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
  consul_data:
