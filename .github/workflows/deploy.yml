name: Deploy

on:
  push:
    tags:
      - 'deploy-*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR (push only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (commit SHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: true
          tags: ghcr.io/adelbeit/jamroom:${{ github.sha }}

      - name: Verify image exists in GHCR
        run: docker manifest inspect ghcr.io/adelbeit/jamroom:${{ github.sha }} > /dev/null

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/jamroom
            printf "IMAGE_TAG=%s\n" "${{ github.sha }}" > .env
            docker compose pull app
            docker compose up -d

      - name: Deploy to Nomad
        if: ${{ env.NOMAD_ADDR != '' }}
        run: |
          nomad job run \
            -var "image_tag=${{ github.sha }}" \
            -var "redis_url=${{ secrets.REDIS_URL }}" \
            -var "redis_password=${{ secrets.REDIS_PASSWORD }}" \
            infra/jamroom.nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}

      - name: Post-deploy health verification
        run: |
          echo "Waiting for service to be ready..."
          for i in {1..30}; do
            if curl -sf http://${{ secrets.DROPLET_HOST }}/api/health > /dev/null 2>&1; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30 - waiting for service..."
            sleep 2
          done
          echo "✗ Health check failed after 30 attempts"
          exit 1
